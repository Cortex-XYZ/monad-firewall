# monad-firewall allowlist
#
# Each entry permits traffic from `ip` to `port`. Any packet whose
# (source IP, destination port) pair is NOT listed here will be dropped.
#
# `ip` is an IPv4 address in dotted-quad notation.
# `port` is a TCP/UDP port number (1-65535).

[[allow]]
ip = "127.0.0.1"
port = 22

[[allow]]
ip = "127.0.0.1"
port = 880

[[allow]]
ip = "127.0.0.1"
port = 443

